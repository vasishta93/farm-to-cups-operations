function downloadCsv(name,data){const csv=data.map(r=>r.map(x=>`"${String(x??"").replaceAll('"','""')}"`).join(",")).join("\r\n"),a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));a.download=name;a.click();URL.revokeObjectURL(a.href)}
function parseCsv(text){const out=[],row=[];let cell="",quoted=false;for(let i=0;i<text.length;i++){const c=text[i],n=text[i+1];if(c==='"'&&quoted&&n==='"'){cell+='"';i++}else if(c==='"'){quoted=!quoted}else if(c===","&&!quoted){row.push(cell.trim());cell=""}else if((c==="\n"||c==="\r")&&!quoted){if(c==="\r"&&n==="\n")i++;row.push(cell.trim());if(row.some(Boolean))out.push(row.splice(0));cell=""}else cell+=c}row.push(cell.trim());if(row.some(Boolean))out.push(row);return out}
async function importBulkPrices(file){if(!file)return;const data=parseCsv(await file.text()),incoming=data.shift()||[],missing=bulkPriceRequired.filter(h=>!incoming.includes(h));if(missing.length){notice.textContent="Bulk upload stopped. Missing columns: "+missing.join(", ");notice.classList.remove("hidden");return}const sheet=db.Ingredients,idCol=idx("Ingredients","Ingredient ID");let added=0,updated=0;data.forEach(source=>{const rec=Object.fromEntries(incoming.map((h,i)=>[h,source[i]??""])),id=rec["Ingredient ID"];if(!id)return;let target=sheet.rows.find(r=>String(r[idCol])===String(id));if(!target){target=sheet.headers.map(h=>rec[h]??"");sheet.rows.push(target);added++}else updated++;bulkPriceHeaders.forEach(h=>{if(rec[h]!==""&&idx("Ingredients",h)>=0)target[idx("Ingredients",h)]=rec[h]});const qty=Number(rec["Base Quantity"]||0),price=Number(rec["Purchase Price ex GST"]||0);if(qty>0&&idx("Ingredients","Unit Cost")>=0)target[idx("Ingredients","Unit Cost")]=Number((price/qty).toFixed(4))});try{await persist();sync.textContent="Bulk prices uploaded"}catch(e){showReadOnly()}notice.textContent=`Bulk price upload processed: ${updated} updated, ${added} added. Unit costs calculated from price ÷ base quantity.`;notice.classList.remove("hidden");bulkPriceFile.value="";render()}

async function submitForm(e){e.preventDefault();const rec=Object.fromEntries(new FormData(e.target).entries()),sheet=db[activeForm.sheet],row=sheet.headers.map(h=>rec[h]??"");if(activeForm.sheet==="Store Requests")row[sheet.headers.indexOf("Status")]="Pending";if(activeForm.sheet==="Ingredients"){const qty=Number(rec["Base Quantity"]||rec["Purchase Qty"]||0),price=Number(rec["Purchase Price ex GST"]||0);if(qty>0)row[sheet.headers.indexOf("Unit Cost")]=Number((price/qty).toFixed(4))}if(activeForm.log)sheet.rows.push(row);else{const ki=sheet.headers.indexOf(activeForm.key),found=sheet.rows.findIndex(r=>String(r[ki])===String(rec[activeForm.key]));if(found>=0)sheet.rows[found]=sheet.headers.map((h,i)=>Object.prototype.hasOwnProperty.call(rec,h)||(activeForm.sheet==="Ingredients"&&h==="Unit Cost")?row[i]:sheet.rows[found][i]);else sheet.rows.push(row)}try{await persist();sync.textContent="Saved to Firebase"}catch(err){showReadOnly()}modal.close();render()}
boot();
</script>
